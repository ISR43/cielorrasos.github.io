<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Cielorraso PVC – SECORED</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #181818;
            --surface2: #222222;
            --border: #2e2e2e;
            --accent: #c8f135;
            --accent2: #f1c435;
            --text: #e8e8e8;
            --muted: #666;
            --danger: #ff5c5c;
            --green: #16a085;
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            margin-bottom: 40px;
        }
        .logo {
            font-family: var(--display);
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }
        h1 {
            font-family: var(--display);
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            line-height: 1.1;
            color: var(--text);
        }
        h1 span { color: var(--accent); }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px;
            margin-bottom: 20px;
        }
        .card-title {
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 20px;
        }

        /* INPUT GROUP */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
        }
        .field { margin-bottom: 0; }
        .field label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        input[type="text"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 15px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.15s;
            width: 260px;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        .nota {
            font-size: 11px;
            color: var(--muted);
            align-self: flex-end;
            padding-bottom: 2px;
        }

        /* BUTTON */
        button {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 3px;
            font-family: var(--display);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 12px 22px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        button:hover { opacity: 0.88; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* RESULTADOS GRID */
        .resultados {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .resultados .card {
            flex: 1 1 45%;
            min-width: 360px;
        }

        /* CARD RESULT HEADER */
        .card h2 {
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* MATERIAL LIST */
        .material-list {
            list-style: none;
            padding: 0;
        }
        .material-list li {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #1e1e1e;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
        }
        .material-list li:last-child { border-bottom: none; }
        .material-list li strong {
            font-family: var(--display);
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            min-width: 32px;
            flex-shrink: 0;
        }

        /* WASTE */
        .waste {
            font-family: var(--display);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 14px;
            padding: 10px 14px;
            background: #161f00;
            border: 1px solid #2e4a00;
            border-radius: 3px;
            color: var(--accent);
        }

        /* OPTIONAL BUTTONS */
        .btn-opc {
            margin-top: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-opc button {
            background: transparent;
            color: var(--accent2);
            border: 1px solid #3a3a00;
            font-size: 11px;
            padding: 8px 14px;
        }
        .btn-opc button:hover {
            background: #1a1a00;
            opacity: 1;
            transform: none;
        }

        /* OPCIONAL BLOCK */
        .opcional {
            margin-top: 12px;
        }
        .opcional h4 {
            font-family: var(--display);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .opcional .material-list {
            background: #161f00;
            border: 1px solid #2e4a00;
            border-radius: 3px;
            padding: 10px 14px;
        }

        /* FOOTER */
        footer {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            margin-top: 24px;
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 3px;
        }
        footer strong { color: var(--accent); }

        /* NAV LINK */
        .nav-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            padding-bottom: 8px;
        }
        .nav-link a {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 2px;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-link a:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <div class="logo">Secored · Sistema 2</div>
            <h1>Calculadora<br><span>Cielorraso PVC</span></h1>
        </header>

        <div class="card">
            <div class="card-title">Medidas del techo</div>
            <div class="input-group">
                <div class="field">
                    <label for="medidas">Medidas (largo × ancho)</label>
                    <input type="text" id="medidas" placeholder="Ej: 8*6" value="8*6">
                </div>
                <button id="calcular">Calcular materiales</button>
                <span class="nota">(Se tomará la mayor como Largo, la menor como Ancho)</span>
            </div>
        </div>

        <div id="resultados" class="resultados">
            <!-- Se llena dinámicamente -->
        </div>

        <footer>Las cantidades se redondean según normas del sistema.</footer>

        <div class="nav-link">
            <a href="sistema1.html">← Volver al Sistema 1</a>
        </div>

    </div>

    <script>
        // Códigos y descripciones
        const articulos = {
            // blancos
            '954': 'PVC 10MM BLANCO 0.2X4MTS',
            '955': 'PVC 10 MM BLANCO 0.2X5MTS',
            '956': 'PVC 10 MM BLANCO X 0.2X6 MTS',
            '953': 'PVC BORDE 10MM BLANCO X 3 MTS',
            '957': 'PVC 10MM UNION "H" BLANCO X 3 MTS',
            '545': 'SOLERAS 35 MM X 2,6 MTS',
            '67': 'MONTANTE 34 MM X 2,4 MTS',
            't8': 'TORNILLO FIX 8x1x3/4',
            '1157': 'TARUGO 6 mm SIN TOPE',
            't1': 'TORNILLO T1 AGUJA 8x9/16',
            // color
            '185': 'PVC AIS 200X10MM VALENCIA X 4 MTS',
            '186': 'PVC AIS 200X10MM VALENCIA X 6 MTS',
            '187': 'PVC AIS PERFIL F DE BORDE X 3 MTS',
            '1398': 'PVC AIS UNION H X 3 MTS',
            // lana
            '876602': 'LANA KNAUF Earthwool 39 ALU 50 mm (24 m²)',
            '876604': 'LANA KNAUF Earthwool 39 ALU 70 mm (14,4 m²)'
        };

        function roundUp50(num) {
            return Math.ceil(num / 50) * 50;
        }

        function mejorLargo(largo, ancho, orientacion, longitudesDisponibles) {
            let mejor = null;
            let menorDesperdicio = Infinity;
            let mejorResultado = null;

            for (let C of longitudesDisponibles) {
                const res = calcularTablasYDesperdicio(largo, ancho, orientacion, C);
                if (res.waste < menorDesperdicio || (res.waste === menorDesperdicio && C > (mejor || 0))) {
                    menorDesperdicio = res.waste;
                    mejor = C;
                    mejorResultado = res;
                }
            }
            return { C: mejor, ...mejorResultado };
        }

        function calcularTablasYDesperdicio(largo, ancho, orientacion, C) {
            let N, reqLen;
            if (orientacion === 'corto') {
                N = Math.ceil(largo / 0.2);
                reqLen = ancho;
            } else {
                N = Math.ceil(ancho / 0.2);
                reqLen = largo;
            }

            let tables;
            if (reqLen <= C) {
                let piezasPorTabla = Math.floor(C / reqLen);
                tables = Math.ceil(N / piezasPorTabla);
            } else {
                let tablasPorFila = Math.ceil(reqLen / C);
                tables = N * tablasPorFila;
            }
            let totalNeeded = N * reqLen;
            let totalBought = tables * C;
            let waste = totalBought - totalNeeded;
            return { tables, N, reqLen, waste, totalNeeded, totalBought, C };
        }

        function calcularMateriales(largo, ancho, orientacion, color = false) {
            let longitudes = color ? [4, 6] : [4, 5, 6];
            const mejor = mejorLargo(largo, ancho, orientacion, longitudes);
            const C = mejor.C;
            const tables = mejor.tables;
            const N = mejor.N;
            const reqLen = mejor.reqLen;
            const waste = mejor.waste;
            const totalNeeded = mejor.totalNeeded;
            const wastePct = (waste / totalNeeded * 100).toFixed(2);

            const perimetro = 2 * (largo + ancho);
            const borde = Math.ceil(perimetro / 3);

            let h = 0;
            if (reqLen > C) {
                if (orientacion === 'corto') {
                    h = Math.ceil(largo / 3);
                } else {
                    h = Math.ceil(ancho / 3);
                }
            }

            let soleras;
            if (orientacion === 'corto') {
                soleras = Math.ceil((ancho * 2) / 2.6);
            } else {
                soleras = Math.ceil((largo * 2) / 2.6);
            }

            let montantes;
            if (orientacion === 'corto') {
                let paso1 = Math.ceil(largo / 0.4) + 1;
                let paso2 = paso1 * ancho;
                let paso3 = Math.floor(ancho / 1.2) - 1;
                let paso4 = paso3 * largo;
                montantes = Math.ceil((paso2 + paso4) / 2.6);
            } else {
                let paso1 = Math.ceil(ancho / 0.4) + 1;
                let paso2 = paso1 * largo;
                let paso3 = Math.floor(largo / 1.2) - 1;
                let paso4 = paso3 * ancho;
                montantes = Math.ceil((paso2 + paso4) / 2.6);
            }

            const area = largo * ancho;
            const baseTyT = area + 4 * soleras;
            const t8 = roundUp50(baseTyT);
            const tarugos = roundUp50(baseTyT);

            const paso1_t1 = 6 * montantes;
            const paso2_t1 = (tables * C) / 0.4;
            const t1 = roundUp50(paso1_t1 + paso2_t1);

            let codigoPlaca, descPlaca;
            if (color) {
                if (C === 4) codigoPlaca = '185';
                else if (C === 6) codigoPlaca = '186';
                else codigoPlaca = '185';
                descPlaca = articulos[codigoPlaca];
            } else {
                if (C === 4) codigoPlaca = '954';
                else if (C === 5) codigoPlaca = '955';
                else codigoPlaca = '956';
                descPlaca = articulos[codigoPlaca];
            }

            const codigoBorde = color ? '187' : '953';
            const codigoH = color ? '1398' : '957';

            return {
                orientacion,
                color,
                C,
                tables,
                codigoPlaca,
                descPlaca,
                borde,
                h,
                soleras,
                montantes,
                t8,
                tarugos,
                t1,
                wastePct,
                area
            };
        }

        function calcularLana(area) {
            if (area > 29) {
                let rollos = Math.ceil(area / 24);
                return { codigo: '876602', desc: articulos['876602'], cantidad: rollos };
            } else {
                let rollos50 = Math.ceil(area / 24);
                let waste50 = rollos50 * 24 - area;
                let rollos70 = Math.ceil(area / 14.4);
                let waste70 = rollos70 * 14.4 - area;
                if (waste50 <= waste70) {
                    return { codigo: '876602', desc: articulos['876602'], cantidad: rollos50 };
                } else {
                    return { codigo: '876604', desc: articulos['876604'], cantidad: rollos70 };
                }
            }
        }

        function crearTarjeta(result, idSufijo) {
            const div = document.createElement('div');
            div.className = 'card';
            div.id = `card-${idSufijo}`;
            const titulo = result.orientacion === 'corto' ? 'Paralelo al lado más corto' : 'Paralelo al lado más largo';
            const colorText = result.color ? ' · color' : '';
            div.innerHTML = `
            <h2>${titulo}${colorText}</h2>
            <ul class="material-list">
                <li><strong>${result.tables}</strong> – ${result.codigoPlaca} – ${result.descPlaca}</li>
                <li><strong>${result.borde}</strong> – ${result.color ? '187' : '953'} – ${articulos[result.color ? '187' : '953']}</li>
                ${result.h ? `<li><strong>${result.h}</strong> – ${result.color ? '1398' : '957'} – ${articulos[result.color ? '1398' : '957']}</li>` : ''}
                <li><strong>${result.soleras}</strong> – 545 – ${articulos['545']}</li>
                <li><strong>${result.montantes}</strong> – 67 – ${articulos['67']}</li>
                <li><strong>${result.t8}</strong> – t8 – ${articulos['t8']}</li>
                <li><strong>${result.tarugos}</strong> – 1157 – ${articulos['1157']}</li>
                <li><strong>${result.t1}</strong> – t1 – ${articulos['t1']}</li>
            </ul>
            <div class="waste">Desperdicio PVC: ${result.wastePct}%</div>
            <div class="btn-opc">
                <button class="btn-lana" data-id="${idSufijo}">+ Aislación térmica</button>
                <button class="btn-color" data-id="${idSufijo}">+ PVC color</button>
            </div>
            <div id="opcional-${idSufijo}" class="opcional"></div>
        `;
            return div;
        }

        document.getElementById('calcular').addEventListener('click', function () {
            const input = document.getElementById('medidas').value.trim();
            if (!input) return;
            const nums = input.split(/[^\d.,]+/).filter(s => s.length > 0).map(s => parseFloat(s.replace(',', '.')));
            if (nums.length < 2) {
                alert('Ingrese dos medidas válidas');
                return;
            }
            let [a, b] = nums;
            if (isNaN(a) || isNaN(b)) {
                alert('Medidas inválidas');
                return;
            }
            const largo = Math.max(a, b);
            const ancho = Math.min(a, b);

            const resCorto = calcularMateriales(largo, ancho, 'corto', false);
            const resLargo = calcularMateriales(largo, ancho, 'largo', false);

            const contenedor = document.getElementById('resultados');
            contenedor.innerHTML = '';
            contenedor.appendChild(crearTarjeta(resCorto, 'corto'));
            contenedor.appendChild(crearTarjeta(resLargo, 'largo'));

            contenedor.dataset.largo = largo;
            contenedor.dataset.ancho = ancho;
        });

        document.getElementById('resultados').addEventListener('click', function (e) {
            const target = e.target;
            if (!target.classList.contains('btn-lana') && !target.classList.contains('btn-color')) return;

            const id = target.dataset.id;
            const card = document.getElementById(`card-${id}`);
            const opcionalDiv = document.getElementById(`opcional-${id}`);
            const largo = parseFloat(document.getElementById('resultados').dataset.largo);
            const ancho = parseFloat(document.getElementById('resultados').dataset.ancho);
            if (isNaN(largo) || isNaN(ancho)) return;

            if (target.classList.contains('btn-lana')) {
                const area = largo * ancho;
                const lana = calcularLana(area);
                opcionalDiv.innerHTML = `
                <h4>Aislación térmica agregada</h4>
                <ul class="material-list">
                    <li><strong>${lana.cantidad}</strong> – ${lana.codigo} – ${lana.desc}</li>
                </ul>
            `;
            } else if (target.classList.contains('btn-color')) {
                const resColor = calcularMateriales(largo, ancho, id, true);
                const lista = card.querySelector('.material-list');
                lista.children[0].innerHTML = `<strong>${resColor.tables}</strong> – ${resColor.codigoPlaca} – ${resColor.descPlaca}`;
                lista.children[1].innerHTML = `<strong>${resColor.borde}</strong> – 187 – ${articulos['187']}`;
                if (resColor.h) {
                    if (lista.children[2] && lista.children[2].innerHTML.includes('UNION')) {
                        lista.children[2].innerHTML = `<strong>${resColor.h}</strong> – 1398 – ${articulos['1398']}`;
                    } else {
                        const newLi = document.createElement('li');
                        newLi.innerHTML = `<strong>${resColor.h}</strong> – 1398 – ${articulos['1398']}`;
                        lista.insertBefore(newLi, lista.children[2]);
                    }
                } else {
                    for (let i = 0; i < lista.children.length; i++) {
                        if (lista.children[i].innerHTML.includes('UNION')) {
                            lista.removeChild(lista.children[i]);
                            break;
                        }
                    }
                }
                card.querySelector('.waste').innerHTML = `Desperdicio PVC: ${resColor.wastePct}%`;
                opcionalDiv.innerHTML = '';
            }
        });
    </script>
</body>

</html>
