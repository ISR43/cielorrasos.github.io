<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Cielorraso – SECORED</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #c8f135;
    --accent2: #f1c435;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #ff5c5c;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  header {
    margin-bottom: 40px;
  }
  .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  h1 {
    font-family: var(--display);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--text);
  }
  h1 span { color: var(--accent); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .field .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 3px;
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 6px;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .error {
    background: #1e1010;
    border: 1px solid #5c2020;
    border-radius: 3px;
    color: var(--danger);
    font-size: 12px;
    padding: 10px 14px;
    margin-top: 10px;
    display: none;
  }

  /* RESULTADO */
  #resultado { display: none; }

  .res-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .res-title {
    font-family: var(--display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .res-dims {
    font-size: 13px;
    color: var(--muted);
  }
  .res-sup {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-top: 4px;
  }
  .res-sup span { color: var(--muted); font-size: 13px; font-weight: 400; }

  .mat-list { list-style: none; }
  .mat-list li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid #1e1e1e;
    font-size: 13px;
    gap: 12px;
  }
  .mat-list li:last-child { border-bottom: none; }
  .mat-cod {
    color: var(--accent2);
    font-size: 11px;
    min-width: 56px;
    flex-shrink: 0;
  }
  .mat-nom { color: var(--muted); flex: 1; }
  .mat-cant {
    font-family: var(--display);
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    text-align: right;
    white-space: nowrap;
  }
  .mat-uni { color: var(--muted); font-size: 11px; margin-left: 4px; }

  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 16px 0;
  }

  .velas-block {
    background: #161f00;
    border: 1px solid #2e4a00;
    border-radius: 3px;
    padding: 16px;
    margin-top: 16px;
  }
  .velas-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .aviso {
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .aviso .tag {
    display: inline-block;
    background: #1a1a00;
    border: 1px solid #3a3a00;
    color: var(--accent2);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    margin-right: 6px;
  }
  .footer-msg {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 24px;
    padding: 14px;
    border: 1px dashed var(--border);
    border-radius: 3px;
  }
  .footer-msg strong { color: var(--accent); }

  .ambient-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 2px;
    margin: 2px 4px 2px 0;
    color: var(--muted);
  }
  .ambient-tag strong { color: var(--text); }

  .nav-link {
    display: block;
    text-align: center;
    margin-top: 12px;
    padding-bottom: 8px;
  }
  .nav-link a {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px dashed var(--border);
    padding-bottom: 2px;
    transition: color 0.15s, border-color 0.15s;
  }
  .nav-link a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">Secored · Sistema 1</div>
    <h1>Calculadora<br><span>Cielorraso</span></h1>
  </header>

  <div class="card">
    <div class="card-title">Medidas del techo</div>

    <div class="field">
      <label>Medidas (largo × ancho)</label>
      <input id="inp-medidas" type="text" placeholder="ej: 3.5x2.2  o  3.5x2.2 + 4x3" autocomplete="off">
      <div class="hint">Separador: x · * · /  — Varios ambientes: usar +</div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Bajada del techo (cm)</label>
        <input id="inp-baja" type="number" min="1" max="500" placeholder="15 (default)">
        <div class="hint">Vacío = 15 cm</div>
      </div>
    </div>

    <button class="btn" onclick="calcular()">Calcular materiales</button>
    <div class="error" id="err"></div>
  </div>

  <div class="card" id="resultado">
    <div class="res-header" id="res-header"></div>
    <ul class="mat-list" id="mat-list"></ul>
    <div class="velas-block">
      <div class="velas-label">Perfiles para velas del cielorraso</div>
      <ul class="mat-list" id="velas-list"></ul>
    </div>
    <div class="aviso" id="aviso"></div>
  </div>

  <div class="footer-msg">
    <strong>Podés comprar todo o una parte</strong>, te ayudamos a decidir.
  </div>

  <div class="nav-link">
    <a href="sistema2.html">Ir al Sistema 2 →</a>
  </div>

</div>

<script>
// ── UTILIDADES ──────────────────────────────────────────────
function multiplo50(n) { return Math.ceil(n / 50) * 50; }
function floorInt(n)   { return Math.floor(n); }
function ceilInt(n)    { return Math.ceil(n); }

// ── FÓRMULAS ────────────────────────────────────────────────
function calcMontantes(largo, ancho) {
  const d1 = largo / 0.40;
  const paso1 = (d1 === Math.floor(d1)) ? (d1 + 1) : (Math.ceil(d1) + 1);
  const paso2 = paso1 * ancho;
  const d3 = ancho / 1.2;
  let paso3;
  if (d3 === Math.floor(d3))   paso3 = d3 - 1;
  else if (d3 > 2)             paso3 = Math.floor(d3) - 1;
  else                         paso3 = Math.floor(d3);
  // Python: paso4 = paso3 * largo  ← corregido (era ancho)
  const paso4 = paso3 * largo;
  return Math.ceil((paso2 + paso4) / 2.6);
}

function calcSoleras(largo, ancho) {
  return Math.ceil((Math.max(largo, ancho) * 2) / 2.6);
}

function calcVelas(largo, ancho, bajaCm) {
  const isDefault = (bajaCm === null || bajaCm === undefined || isNaN(bajaCm));
  if (isDefault) bajaCm = 15;
  const bajaM = bajaCm / 100;
  const p1 = Math.floor(ancho / 1.2);
  const p2 = Math.floor(largo / 1.2);
  const p3 = p1 * p2;
  return { barras: Math.ceil((p3 * 1.15 * bajaM) / 2.6), isDefault, bajaCm };
}

function calcPlacas(largo, ancho) {
  return Math.ceil((largo * ancho) / 2.88);
}

function calcTornilloFix(largo, ancho, soleras) {
  return Math.ceil(largo * ancho + 4 * soleras); // crudo, multiplo50 al final
}

function calcTarugo(largo, ancho, soleras) {
  return Math.ceil(largo * ancho + 4 * soleras); // crudo, multiplo50 al final
}

function calcT1(montantes) { return montantes * 6; } // crudo, multiplo50 al final
function calcT2(largo, ancho) { return Math.ceil(largo * ancho * 18); } // crudo

function calcMasilla(sup) {
  const consumo = sup * 0.8;
  const ops = [
    ["ma1",  "MASILLA ANCLAFLEX x 1,8 kg",  1.8],
    ["ma7",  "MASILLA ANCLAFLEX x 7 kg",     7.0],
    ["ma15", "MASILLA ANCLAFLEX x 15 kg",   15.0],
  ];
  for (const [cod, nom, kg] of ops) {
    if (consumo / kg <= 1) return { cod, nom, cant: 1 };
  }
  return { cod: "ma32", nom: "MASILLA ANCLAFLEX x 32 kg", cant: Math.ceil(consumo / 32) };
}

function calcCinta(sup) {
  const consumo = sup * 1.05;
  if (Math.ceil(consumo / 23) <= 1)  return { cod: "127", nom: "CINTA DE PAPEL 23 m",  cant: 1 };
  if (Math.ceil(consumo / 75) <= 1)  return { cod: "129", nom: "CINTA DE PAPEL 75 m",  cant: 1 };
  return { cod: "123", nom: "CINTA DE PAPEL 150 m", cant: Math.ceil(consumo / 150) };
}

// ── CÁLCULO POR AMBIENTE ────────────────────────────────────
function calcularAmbiente(largoRaw, anchoRaw, bajaCm) {
  const largo = Math.max(largoRaw, anchoRaw);
  const ancho = Math.min(largoRaw, anchoRaw);
  const sup   = largo * ancho;
  const montantes = calcMontantes(largo, ancho);
  const soleras   = calcSoleras(largo, ancho);
  const velas     = calcVelas(largo, ancho, bajaCm);
  return {
    largo, ancho, sup, montantes, soleras,
    velas: velas.barras, velaDefault: velas.isDefault, bajaCm: velas.bajaCm,
    placas:  calcPlacas(largo, ancho),
    t8:      calcTornilloFix(largo, ancho, soleras), // crudo
    tarugo:  calcTarugo(largo, ancho, soleras),       // crudo
    t1:      calcT1(montantes),                       // crudo
    t2:      calcT2(largo, ancho),                    // crudo
    masilla: calcMasilla(sup),
    cinta:   calcCinta(sup),
  };
}

function combinarAmbientes(lista) {
  const supTotal = lista.reduce((s, a) => s + a.sup, 0);
  return {
    sup:       supTotal,
    montantes: lista.reduce((s, a) => s + a.montantes, 0),
    soleras:   lista.reduce((s, a) => s + a.soleras,   0),
    velas:     lista.reduce((s, a) => s + a.velas,     0),
    placas:    lista.reduce((s, a) => s + a.placas,    0),
    t8:        multiplo50(lista.reduce((s, a) => s + a.t8,     0)),
    tarugo:    multiplo50(lista.reduce((s, a) => s + a.tarugo, 0)),
    t1:        multiplo50(lista.reduce((s, a) => s + a.t1,     0)),
    t2:        multiplo50(lista.reduce((s, a) => s + a.t2,     0)),
    masilla:   calcMasilla(supTotal),
    cinta:     calcCinta(supTotal),
    velaDefault: lista.some(a => a.velaDefault),
    bajaCm:    lista[0].bajaCm,
  };
}

// ── PARSEO DE MEDIDAS ───────────────────────────────────────
function parsearMedidas(texto) {
  const partes = texto.replace(/\s/g, '').split('+');
  return partes.map(p => {
    const nums = p.split(/[xX*/]/);
    if (nums.length !== 2) throw new Error(`Formato inválido: "${p}"`);
    const a = parseFloat(nums[0]), b = parseFloat(nums[1]);
    if (isNaN(a) || isNaN(b) || a <= 0 || b <= 0) throw new Error(`Valores inválidos en: "${p}"`);
    return [Math.max(a,b), Math.min(a,b)];
  });
}

// ── RENDER ──────────────────────────────────────────────────
function li(cod, nom, cant, uni) {
  return `<li>
    <span class="mat-cod">${cod}</span>
    <span class="mat-nom">${nom}</span>
    <span class="mat-cant">${cant}<span class="mat-uni">${uni}</span></span>
  </li>`;
}

function calcular() {
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';

  let medidas, bajaCm;
  try {
    medidas = parsearMedidas(document.getElementById('inp-medidas').value.trim());
    const bajaVal = document.getElementById('inp-baja').value.trim();
    bajaCm = bajaVal ? parseFloat(bajaVal) : null;
    if (bajaCm !== null && (isNaN(bajaCm) || bajaCm <= 0)) throw new Error('La bajada debe ser un número positivo.');
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.style.display = 'block';
    return;
  }

  const resultados = medidas.map(([l, a]) => calcularAmbiente(l, a, bajaCm));
  const resultadosAmbientes = resultados;
  let datos;
  if (resultados.length === 1) {
    datos = Object.assign({}, resultados[0]);
    datos.t8     = multiplo50(datos.t8);
    datos.tarugo = multiplo50(datos.tarugo);
    datos.t1     = multiplo50(datos.t1);
    datos.t2     = multiplo50(datos.t2);
  } else {
    datos = combinarAmbientes(resultados);
  }

  // Header
  let headerHtml = `<div class="res-title">Resultado del cálculo</div>`;
  if (resultados.length > 1) {
    headerHtml += resultados.map((r, i) =>
      `<span class="ambient-tag">Amb. ${i+1} <strong>${r.largo}×${r.ancho} m</strong></span>`
    ).join('');
    headerHtml += `<div class="res-sup">${datos.sup.toFixed(2)} <span>m² combinados</span></div>`;
  } else {
    headerHtml += `<div class="res-dims">Largo = ${datos.largo} m · Ancho = ${datos.ancho} m</div>`;
    headerHtml += `<div class="res-sup">${datos.sup.toFixed(2)} <span>m²</span></div>`;
  }
  document.getElementById('res-header').innerHTML = headerHtml;

  // Lista materiales
  const ml = document.getElementById('mat-list');
  ml.innerHTML =
    li('67',           'MONTANTE 34×35 mm x 2,6 m',            datos.montantes, 'barras') +
    li('545',          'SOLERA 35x30 mm x 2,6 m',              datos.soleras,   'barras') +
    li('095240',       'PLACA KNAUF STD 9.5 mm 2.40×1.20 m',   datos.placas,    'unidades') +
    li('t8',           'TORNILLO FIX 8x1x3/4',                  datos.t8,        'unidades') +
    li('1157',         'TARUGO 6 mm SIN TOPE',                  datos.tarugo,    'unidades') +
    li('t1',           'TORNILLO T1 AGUJA 8x9/16',              datos.t1,        'unidades') +
    li('t2',           'TORNILLO T2 PUNTA AGUJA',               datos.t2,        'unidades') +
    li(datos.masilla.cod, datos.masilla.nom,                     datos.masilla.cant, 'unid.') +
    li(datos.cinta.cod,   datos.cinta.nom,                       datos.cinta.cant,   'unid.');

  // Velas
  document.getElementById('velas-list').innerHTML =
    li('545', 'SOLERA 35x30 mm x 2,6 m', datos.velas, 'barras');

  // Aviso bajada
  const aviso = document.getElementById('aviso');
  if (datos.velaDefault) {
    aviso.innerHTML = `<span class="tag">⚠ aviso</span>Bajada no indicada — se calculó con <strong>15 cm</strong> por defecto.`;
  } else {
    aviso.innerHTML = `<span class="tag">ℹ info</span>Velas calculadas con bajada de <strong>${datos.bajaCm} cm</strong>.`;
  }

  document.getElementById('resultado').style.display = 'block';
  document.getElementById('resultado').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Enter para calcular
document.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
</script>
</body>
</html>
